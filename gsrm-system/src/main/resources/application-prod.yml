# =============================================================================
# Ground Station Resource Management System (GSRM)
# Production Environment Configuration
# 
# Note: For production, consider switching to PostgreSQL/MySQL
# The JPA abstraction allows seamless database switching.
# 
# @author Jeff
# @since 2026-03-06
# =============================================================================

spring:
  # Production Database Configuration
  # Uncomment the appropriate section for your production database
  
  # --- SQLite (for small-scale production) ---
  datasource:
    url: jdbc:sqlite:./data/gsrm-prod.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-timeout: 30000
  
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  
  # --- PostgreSQL (for production scale) ---
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/gsrm
  #   username: ${DB_USERNAME}
  #   password: ${DB_PASSWORD}
  #   driver-class-name: org.postgresql.Driver
  #   hikari:
  #     maximum-pool-size: 20
  #     minimum-idle: 5
  #     connection-timeout: 30000
  # 
  # jpa:
  #   database-platform: org.hibernate.dialect.PostgreSQLDialect
  #   hibernate:
  #     ddl-auto: validate
  #   show-sql: false
  #   open-in-view: false
  
  # --- MySQL (alternative production option) ---
  # datasource:
  #   url: jdbc:mysql://localhost:3306/gsrm?useSSL=true&serverTimezone=UTC
  #   username: ${DB_USERNAME}
  #   password: ${DB_PASSWORD}
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   hikari:
  #     maximum-pool-size: 20
  #     minimum-idle: 5
  #     connection-timeout: 30000
  # 
  # jpa:
  #   database-platform: org.hibernate.dialect.MySQLDialect
  #   hibernate:
  #     ddl-auto: validate
  #   show-sql: false
  #   open-in-view: false
  
  sql:
    init:
      mode: never

# JWT Configuration for Production
jwt:
  secret: ${JWT_SECRET}  # Must be set via environment variable
  expiration: 86400000
  refresh-expiration: 604800000

# Production logging
logging:
  level:
    root: WARN
    com.gsrm: INFO
    org.springframework.security: WARN

# Disable Swagger in production (optional)
springdoc:
  swagger-ui:
    enabled: false
